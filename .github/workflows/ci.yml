name: Unit Tests
permissions:
  contents: read
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        # https://raw.githubusercontent.com/actions/python-versions/main/versions-manifest.json
        include:
          - python-version: "3.6"
            container: "python:3.6"
          - python-version: "3.7"
            container: "python:3.7"
          - python-version: "3.8"
          - python-version: "3.9"
          - python-version: "3.10"
          - python-version: "3.11"
          - python-version: "3.12"
          - python-version: "3.13"
          - python-version: "3.14"
    name: Python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup python
        if: ${{ !matrix.container }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Install dependencies
        if: ${{ !matrix.container }}
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Install dependencies (legacy Python in container)
        if: ${{ matrix.container }}
        run: |
          # setuptools>=64 requires Python >=3.8, so we can't build on 3.6/3.7.
          # Instead, add the source directory to PYTHONPATH and install test deps.
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r requirements.txt || true
      - name: Run tests with pytest and codecov
        run: PYTHONPATH="${PYTHONPATH:+$PYTHONPATH:}$PWD" pytest --cov=phoebusgen --cov-report=xml:coverage.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          name: Coverage
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: false
